<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .google-card {
            background: white;
            border-radius: 28px;
            width: 100%;
            max-width: 448px;
            padding: 36px 36px 48px;
            box-sizing: border-box;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.05);
        }
        .google-logo {
            width: 74px;
            margin: 0 auto 16px;
            display: block;
        }
        .account-item:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="google-card text-center">
        <!-- Google Logo -->
        <svg class="google-logo" viewBox="0 0 74 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9.54 11.23v4.28h9.87c-.4 2.37-2.98 6.94-9.87 6.94-5.94 0-10.8-4.94-10.8-11.02S3.6 5.35 9.54 5.35c3.34 0 5.58 1.43 6.86 2.65l3.39-3.26C17.15 2.19 13.68 0 9.54 0 4.27 0 0 4.27 0 9.54s4.27 9.54 9.54 9.54c5.51 0 9.17-3.87 9.17-9.33 0-.71-.08-1.34-.18-1.92H9.54z" fill="#4285F4"/>
            <path d="M29.5 12.82c0 3.73-2.67 5.92-5.48 5.92-3.07 0-5.55-2.28-5.55-5.92 0-3.66 2.45-5.92 5.55-5.92 2.81 0 5.48 2.19 5.48 5.92zm-2.4 0c0-2.46-1.54-3.95-3.08-3.95-1.55 0-3.15 1.5-3.15 3.95 0 2.44 1.59 3.94 3.15 3.94 1.54 0 3.08-1.49 3.08-3.94z" fill="#EA4335"/>
            <path d="M41.87 12.82c0 3.73-2.67 5.92-5.48 5.92-3.07 0-5.55-2.28-5.55-5.92 0-3.66 2.45-5.92 5.55-5.92 2.81 0 5.48 2.19 5.48 5.92zm-2.4 0c0-2.46-1.54-3.95-3.08-3.95-1.55 0-3.15 1.5-3.15 3.95 0 2.44 1.59 3.94 3.15 3.94 1.54 0 3.08-1.49 3.08-3.94z" fill="#FBBC05"/>
            <path d="M53.11 7.21v11.13c0 4.54-2.64 6.4-5.26 6.4-2.73 0-4.37-1.83-4.99-3.32l2.12-.88c.38.93 1.34 2.23 2.87 2.23 1.77 0 2.86-1.1 2.86-3.16v-.79h-.08c-.52.64-1.56 1.32-2.82 1.32-2.65 0-5.11-2.29-5.11-5.92 0-3.56 2.46-5.83 5.11-5.83 1.26 0 2.29.68 2.82 1.3h.08v-1.08h2.36zm-2.18 5.61c0-2.31-1.46-3.85-2.95-3.85-1.56 0-3.04 1.55-3.04 3.85 0 2.34 1.48 3.94 3.04 3.94 1.53 0 2.95-1.61 2.95-3.94z" fill="#4285F4"/>
            <path d="M57.65 1.13h2.4v17.4h-2.4z" fill="#34A853"/>
            <path d="M68.51 14.54l1.92 1.28c-.61.9-2.07 2.92-5.32 2.92-3.75 0-5.46-2.9-5.46-5.92 0-3.73 2.58-5.92 5.19-5.92 2.63 0 4.6 2.23 5.06 3.44l.24.61-7.25 3c.59 1.16 1.53 1.83 2.76 1.83 1.18 0 2.06-.57 2.86-1.24zm-3.05-3.1l4.47-1.85c-.24-.62-1.06-1.05-1.92-1.05-1.14 0-2.73 1.05-2.55 2.9z" fill="#EA4335"/>
        </svg>

        <h1 class="text-2xl font-normal text-[#1f1f1f] mb-1">Choose an account</h1>
        <p class="text-[15px] text-[#444746] mb-8">to continue to <span class="font-medium">AIOManager</span></p>

        <div class="border border-[#c7c7c7] rounded-xl overflow-hidden text-left mb-8">
            <!-- Account 1 -->
            <button onclick="selectAccount('John Doe', 'john.doe@gmail.com')" class="account-item w-full flex items-center p-3 border-b border-[#c7c7c7] transition-colors cursor-pointer text-left">
                <img src="https://ui-avatars.com/api/?name=John+Doe&background=0D8ABC&color=fff" class="w-9 h-9 rounded-full mr-3" alt="Avatar">
                <div class="flex-1">
                    <div class="text-[14px] font-medium text-[#1f1f1f]">John Doe</div>
                    <div class="text-[12px] text-[#444746]">john.doe@gmail.com</div>
                </div>
            </button>
            
            <!-- Account 2 -->
            <button onclick="selectAccount('Rishabh Raj', 'rishabh@example.com')" class="account-item w-full flex items-center p-3 border-b border-[#c7c7c7] transition-colors cursor-pointer text-left">
                <img src="https://ui-avatars.com/api/?name=Rishabh+Raj&background=F59E0B&color=fff" class="w-9 h-9 rounded-full mr-3" alt="Avatar">
                <div class="flex-1">
                    <div class="text-[14px] font-medium text-[#1f1f1f]">Rishabh Raj</div>
                    <div class="text-[12px] text-[#444746]">rishabh@example.com</div>
                </div>
            </button>
            
            <!-- Use another account -->
            <button class="account-item w-full flex items-center p-3 transition-colors cursor-pointer text-left">
                <div class="w-9 h-9 rounded-full mr-3 flex items-center justify-center">
                    <svg class="w-5 h-5 text-[#444746]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                </div>
                <div class="text-[14px] font-medium text-[#1f1f1f]">Use another account</div>
            </button>
        </div>

        <div class="text-left">
            <p class="text-[12px] text-[#444746] leading-relaxed">
                To continue, Google will share your name, email address, and profile picture with AIOManager. Before using this app, you can review AIOManager's <a href="#" class="text-[#0b57d0] hover:underline">privacy policy</a> and <a href="#" class="text-[#0b57d0] hover:underline">terms of service</a>.
            </p>
        </div>
    </div>

    <script>
        function selectAccount(name, email) {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUri = urlParams.get('redirect_uri') || 'index.html';
            const authMode = urlParams.get('auth_mode') || 'login';
            
            // Redirect back with mock login info
            window.location.href = `${redirectUri}?mock_login=gmail&mock_email=${encodeURIComponent(email)}&mock_name=${encodeURIComponent(name)}&auth_mode_redirect=${authMode}`;
        }
    </script>
</body>
</html>
